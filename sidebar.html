<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Scrybe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<div class="app">

  <!-- ═══════════════════════════
       PAGE 1 — FORM
  ═══════════════════════════ -->
  <div class="page" id="pageForm">
    <header class="hdr">
      <div class="brand">
        <div class="brand-icon">
          <img src="Scrybebackground.png" alt="Brand Icon">
        </div>
        <span class="brand-name">Scrybe</span>
      </div>
    </header>
    <div class="body">
      
      <div class="section">
        <div class="sec-label">Assignment</div>
        <div class="row row-2">
          <div class="field">
            <label>Subject</label>
            <select id="subject">
              <option value="" disabled selected>Choose…</option>
              <option value="English / Literature">English / Lit</option>
              <option value="History">History</option>
              <option value="Science">Science</option>
              <option value="Psychology">Psychology</option>
              <option value="Philosophy">Philosophy</option>
              <option value="Economics">Economics</option>
              <option value="Political Science">Pol. Science</option>
              <option value="Computer Science">Comp. Science</option>
              <option value="Sociology">Sociology</option>
              <option value="Art / Design">Art / Design</option>
              <option value="other">Other…</option>
            </select>
          </div>
          <div class="field">
            <label>Grade</label>
            <select id="grade">
              <option value="A+">A+ — Perfect</option>
              <option value="A" selected>A — Excellent</option>
              <option value="B+">B+ — Very Good</option>
              <option value="B">B — Good</option>
              <option value="C">C — Average</option>
            </select>
          </div>
        </div>
        <div id="otherSubjectWrap" class="field">
          <label>Specify subject</label>
          <input type="text" id="otherSubject" placeholder="e.g. Environmental Studies" maxlength="60" />
        </div>
      </div>

      <div class="section">
        <div class="sec-label">Parameters</div>
        <div class="field">
          <label>Word Count <span class="lbl-unit">words</span></label>
          <input class="mono-input" type="number" id="wordCount" placeholder="500" min="50" max="99999" inputmode="numeric" />
        </div>
      </div>

      <div class="section">
        <div class="sec-label">Content</div>
        <div class="field">
          <label>Rubric / Grading Criteria</label>
          <textarea id="rubric" rows="3" placeholder="Paste your rubric here…"></textarea>
        </div>
        <div class="field">
          <label>Instructions / Prompt</label>
          <textarea id="instructions" rows="3" placeholder="Paste the assignment prompt or describe what to write…"></textarea>
        </div>
      </div>

      <div class="section">
        <div class="sec-label">Options</div>
        <div class="toggle-row" id="outlineToggle">
          <span class="toggle-label">Generate outline first</span>
          <div class="sw" id="outlineSw"></div>
        </div>
      </div>

      <div class="section">
        <button class="gen-btn" id="genBtn">Generate →</button>
      </div>
    </div>

    <div class="gen-overlay" id="genOverlay">
      <div class="gen-overlay-inner">
        <div class="gen-bars">
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
        </div>
        <div class="gen-overlay-title" id="genOverlayTitle">Writing essay…</div>
        <div class="gen-overlay-sub">This takes about 15–30 seconds</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════
       PAGE 2 — OUTLINE
  ═══════════════════════════ -->
  <div class="page page-hidden" id="pageOutline">
    <header class="hdr">
      <button class="back-btn" id="outlineBackBtn">
        <svg viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5 8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 2.5h9M2 6.5h6M2 10.5h4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-name">Scrybe</span>
      </div>
    </header>
    <div class="body">
      <div class="section" style="flex:1;">
        <div class="sec-label-row">
          <span class="sec-label" style="margin-bottom:0;">Outline</span>
          <span class="outline-badge">Review before writing</span>
        </div>
        <div class="outline-box" id="outlineBox"></div>
      </div>
      <div class="section">
        <button class="gen-btn" id="outlineNextBtn">Review Draft →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════
       PAGE 3 — DRAFT REVIEW
  ═══════════════════════════ -->
  <div class="page page-hidden" id="pageDraft">
    <header class="hdr">
      <button class="back-btn" id="draftBackBtn">
        <svg viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5 8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 2.5h9M2 6.5h6M2 10.5h4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-name">Scrybe</span>
      </div>
    </header>
    <div class="body">

      <!-- Draft essay — raw, not humanized -->
      <div class="section">
        <div class="sec-label-row">
          <span class="sec-label" style="margin-bottom:0;">Draft</span>
          <span class="draft-badge">Not yet humanized</span>
        </div>
        <textarea class="essay-preview" id="draftText" spellcheck="false"></textarea>
      </div>

      <!-- Request changes -->
      <div class="section">
        <div class="sec-label">Request Changes <span class="lbl-unit">optional</span></div>
        <div class="field" style="margin-bottom:10px;">
          <textarea id="changesNote" rows="3" placeholder="e.g. Make the intro stronger, add more evidence in paragraph 2, shorten the conclusion…"></textarea>
        </div>
        <button class="apply-btn" id="applyBtn">Apply Changes →</button>
      </div>

      <!-- Approve -->
      <div class="section">
        <button class="gen-btn" id="approveBtn">Looks good — Finalize →</button>
      </div>

    </div>

    <!-- overlay for apply/approve actions -->
    <div class="gen-overlay" id="draftOverlay">
      <div class="gen-overlay-inner">
        <div class="gen-bars">
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
          <div class="gen-bar"></div>
        </div>
        <div class="gen-overlay-title" id="draftOverlayTitle">Applying changes…</div>
        <div class="gen-overlay-sub"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════
       PAGE 4 — PREVIEW (type)
  ═══════════════════════════ -->
  <div class="page page-hidden" id="pagePreview">
    <header class="hdr">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5 8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 2.5h9M2 6.5h6M2 10.5h4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span class="brand-name">Scrybe</span>
      </div>
    </header>
    <div class="body">
      <div class="section">
        <div class="sec-label-row">
          <span class="sec-label" style="margin-bottom:0;">Final Essay</span>
          <span class="word-count-badge" id="wordCountBadge">— words</span>
        </div>
        <textarea class="essay-preview" id="essayText" spellcheck="false"></textarea>
      </div>
      <div class="section">
        <div class="sec-label">Typing Speed</div>
        <div class="field" style="margin-bottom:12px;">
          <label>Speed <span class="lbl-unit">wpm</span></label>
          <input class="mono-input" type="number" id="wpm" placeholder="80" min="1" max="800" inputmode="numeric" />
        </div>
        <div class="typing-anim" id="typingAnim">
          <div class="typing-bar"></div>
          <div class="typing-bar"></div>
          <div class="typing-bar"></div>
          <div class="typing-bar"></div>
          <div class="typing-bar"></div>
          <span class="typing-anim-label" id="typingAnimLabel">Typing…</span>
        </div>
        <div class="type-controls">
          <button class="type-btn" id="typeBtn">▶  Start Typing</button>
          <button class="type-btn type-btn-pause" id="pauseBtn">⏸</button>
          <button class="type-btn" id="stopBtn">⏹</button>
        </div>
        <div id="status"></div>
      </div>
    </div>
  </div>

</div>
<script src="sidebar.js"></script>
</body>
</html>
